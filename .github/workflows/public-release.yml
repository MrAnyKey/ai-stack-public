name: public release

on:
  create:

permissions:
  contents: write

concurrency:
  group: public-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'MrAnyKey/ai-stack-public' && github.event_name == 'create' && github.event.ref_type == 'tag' && startsWith(github.ref, 'v')
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.ref }}

    steps:
      - name: Checkout release ref
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install python-semantic-release
        run: python3 -m pip install --quiet python-semantic-release==10.5.3

      - name: Generate release notes and publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          semantic-release changelog --post-to-release-tag "$RELEASE_TAG"
