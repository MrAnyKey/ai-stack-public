name: public release

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: public-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'MrAnyKey/ai-stack-public' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Semantic version release
        uses: python-semantic-release/python-semantic-release@v10.5.3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          build: "false"
          changelog: "false"
          commit: "false"
          tag: "true"
          push: "true"
          vcs_release: "true"
