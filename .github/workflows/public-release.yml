name: public release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish in ai-stack-public
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: public-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'MrAnyKey/ai-stack-public' && (github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}
          fetch-depth: 0

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release edit "$RELEASE_TAG" --title "$RELEASE_TAG"
          else
            gh release create "$RELEASE_TAG" \
              --verify-tag \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
