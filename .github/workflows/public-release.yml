name: public release

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v1.0.0)'
        required: true

permissions:
  contents: write

concurrency:
  group: public-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: contains(github.repository, 'ai-stack-public')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install python-semantic-release
        run: python3 -m pip install --quiet python-semantic-release==10.5.3

      - name: Generate release notes and publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
        run: |
          set -euo pipefail
          semantic-release changelog --post-to-release-tag "$RELEASE_TAG"
