name: public release

on:
  workflow_dispatch:
    inputs:
      tag:
        description: Tag to publish in ai-stack-public
        required: true
        type: string
      target_sha:
        description: Commit SHA in ai-stack-public to tag and release
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: public-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    if: github.repository == 'MrAnyKey/ai-stack-public' && github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ inputs.tag }}
      RELEASE_TARGET_SHA: ${{ inputs.target_sha }}

    steps:
      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            echo "Release $RELEASE_TAG already exists"
          else
            gh release create "$RELEASE_TAG" \
              --target "$RELEASE_TARGET_SHA" \
              --title "$RELEASE_TAG" \
              --generate-notes
          fi
