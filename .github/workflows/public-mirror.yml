name: public mirror

on:
  workflow_dispatch:
  workflow_run:
    workflows: [release]
    branches: [master]
    types: [completed]

permissions:
  contents: read

concurrency:
  group: public-mirror
  cancel-in-progress: false

jobs:
  mirror:
    if: github.repository == 'MrAnyKey/ai-stack' && (github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout master
        uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0

      - name: Configure public mirror deploy key
        env:
          PUBLIC_REPO_DEPLOY_KEY: ${{ secrets.PUBLIC_REPO_DEPLOY_KEY }}
        run: |
          set -euo pipefail
          test -n "$PUBLIC_REPO_DEPLOY_KEY"
          mkdir -p ~/.ssh
          printf '%s\n' "$PUBLIC_REPO_DEPLOY_KEY" > ~/.ssh/public_repo_deploy_key
          chmod 600 ~/.ssh/public_repo_deploy_key
          ssh-keyscan github.com >> ~/.ssh/known_hosts
          git config --global core.sshCommand "ssh -i ~/.ssh/public_repo_deploy_key -o IdentitiesOnly=yes"

      - name: Publish public mirror
        env:
          PUBLIC_REPOSITORY: git@github.com:MrAnyKey/ai-stack-public.git
          PUBLIC_BRANCH: master
          SOURCE_REF: master
        run: scripts/publish_public_mirror.sh

      - name: Detect mirrored release tag
        id: mirrored_release
        run: |
          set -euo pipefail
          release_tag="$(git tag --points-at HEAD | grep -E '^v' | head -n 1 || true)"
          echo "tag=$release_tag" >> "$GITHUB_OUTPUT"

      - name: Trigger public validate
        env:
          PUBLIC_REPO_WORKFLOW_TOKEN: ${{ secrets.PUBLIC_REPO_WORKFLOW_TOKEN }}
        run: |
          set -euo pipefail
          test -n "$PUBLIC_REPO_WORKFLOW_TOKEN"
          curl -sSfL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PUBLIC_REPO_WORKFLOW_TOKEN" \
            https://api.github.com/repos/MrAnyKey/ai-stack-public/actions/workflows/validate.yml/dispatches \
            -d '{"ref":"master"}'

      - name: Trigger public release
        if: steps.mirrored_release.outputs.tag != ''
        env:
          PUBLIC_REPO_WORKFLOW_TOKEN: ${{ secrets.PUBLIC_REPO_WORKFLOW_TOKEN }}
          RELEASE_TAG: ${{ steps.mirrored_release.outputs.tag }}
        run: |
          set -euo pipefail
          test -n "$PUBLIC_REPO_WORKFLOW_TOKEN"
          payload="$(printf '{"ref":"master","inputs":{"tag":"%s","target_sha":"%s"}}' "$RELEASE_TAG" "$GITHUB_SHA")"
          curl -sSfL \
            -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $PUBLIC_REPO_WORKFLOW_TOKEN" \
            https://api.github.com/repos/MrAnyKey/ai-stack-public/actions/workflows/public-release.yml/dispatches \
            -d "$payload"
